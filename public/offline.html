<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <title>TripFlow offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Plus Jakarta Sans", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fd;
        color: #0b1326;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: calc(1.25rem + env(safe-area-inset-top)) 1rem calc(1.25rem + env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), transparent 26rem),
          #f7f8fd;
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid rgba(223, 229, 238, 0.9);
        border-radius: 1.75rem;
        background: rgba(255, 255, 255, 0.92);
        padding: 1.5rem;
        text-align: center;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      }

      img {
        width: 4.5rem;
        height: 4.5rem;
        object-fit: contain;
      }

      h1 {
        margin: 1rem 0 0;
        font-size: clamp(1.6rem, 8vw, 2.25rem);
        line-height: 1.05;
      }

      p {
        margin: 0.75rem auto 0;
        max-width: 21rem;
        color: #45464d;
        font-weight: 650;
        line-height: 1.65;
      }

      button {
        min-height: 3rem;
        margin-top: 1.25rem;
        border: 0;
        border-radius: 1rem;
        background: #0b1326;
        color: white;
        padding: 0.8rem 1.1rem;
        font: inherit;
        font-weight: 850;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 3px solid rgba(16, 185, 129, 0.45);
        outline-offset: 3px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          background: #0f172a;
          color: #f8fafc;
        }

        body {
          background:
            radial-gradient(circle at top left, rgba(16, 185, 129, 0.18), transparent 25rem),
            #0f172a;
        }

        main {
          border-color: #334155;
          background: rgba(17, 24, 39, 0.94);
          box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        }

        p {
          color: #cbd5e1;
        }

        button {
          background: #34d399;
          color: #052e22;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="TripFlow" />
      <h1>Você está offline.</h1>
      <p>Algumas informações do TripFlow podem não estar disponíveis até a conexão voltar.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
